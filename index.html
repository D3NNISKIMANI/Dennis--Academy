.photo-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(11,15,23,0.25) 0%, rgba(11,15,23,0.55) 55%, var(--bg) 100%);
}
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.35;
  background-image:
    linear-gradient(rgba(79,209,197,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,209,197,0.035) 1px, transparent 1px);
  background-size:28px 28px;
}
.glow{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:520px;height:320px;
  background:radial-gradient(ellipse at center, rgba(232,163,61,0.10), transparent 70%);
  z-index:0;pointer-events:none;}

/* ---------- Header ---------- */
header{position:relative;z-index:1;padding:22px 20px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;border-radius:8px;background:#0c0f14;overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px rgba(232,163,61,0.4), 0 4px 14px rgba(232,163,61,0.25);}
.brand-mark img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-text b{font-size:15px;letter-spacing:0.02em;}
.brand-text span{font-family:var(--mono);font-size:10.5px;color:var(--cyan);letter-spacing:0.08em;}
.status-pill{font-family:var(--mono);font-size:10.5px;color:var(--green);border:1px solid rgba(63,191,127,0.4);
  background:rgba(63,191,127,0.08);padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:6px;}
.menu-btn{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--bg);border:none;
  background:linear-gradient(135deg,var(--cyan),#2fa89c);padding:9px 15px;border-radius:20px;display:flex;
  align-items:center;gap:6px;cursor:pointer;box-shadow:0 3px 12px rgba(79,209,197,0.3);}
.menu-btn:active{transform:scale(0.95);}
.menu-btn svg{width:14px;height:14px;flex-shrink:0;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);
  animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

main{position:relative;z-index:1;flex:1;padding:4px 20px 100px;display:flex;flex-direction:column;gap:18px;}

/* ---------- Screen transitions ---------- */
.screen{animation:fadeIn 0.35s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.hidden{display:none !important;}

/* ---------- Stat strip ---------- */
.stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center;}
.stat-card .num{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--cyan);}
.stat-card .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}

/* ---------- Section label ---------- */
.section-lbl{font-family:var(--mono);font-size:11px;color:var(--amber);text-transform:uppercase;
  letter-spacing:0.12em;display:flex;align-items:center;gap:8px;margin:2px 0 -6px;}
.section-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}

/* ---------- Set cards ---------- */
.set-grid{display:flex;flex-direction:column;gap:10px;}
.set-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s, background .15s;position:relative;overflow:hidden;}
.set-card:active{transform:scale(0.99);}
.set-card.selected{border-color:var(--amber);background:var(--panel-2);}
.set-card.selected::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber);}
.set-badge{width:44px;height:44px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:16px;flex-shrink:0;color:var(--text);}
.set-info{flex:1;min-width:0;}
.set-info .set-name{font-size:14.5px;font-weight:600;}
.set-info .set-meta{font-size:11.5px;color:var(--muted);margin-top:2px;font-family:var(--mono);}
.set-bar{width:100%;height:4px;background:var(--line);border-radius:2px;margin-top:7px;overflow:hidden;}
.set-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:2px;}

/* ---------- Domain breakdown ---------- */
.domain-grid{display:flex;flex-direction:column;gap:8px;}
.domain-row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 14px;
  display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.domain-row:active{transform:scale(0.99);}
.domain-row.selected{border-color:var(--amber);}
.domain-num{font-family:var(--mono);font-size:12px;color:var(--muted);width:26px;flex-shrink:0;}
.domain-body{flex:1;min-width:0;}
.domain-name{font-size:13px;font-weight:600;}
.domain-meta{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px;}
.domain-acc{font-family:var(--mono);font-size:15px;font-weight:700;width:44px;text-align:right;flex-shrink:0;}

/* ---------- Chip row (length / mode) ---------- */
.chip-row{display:flex;gap:8px;flex-wrap:wrap;}
.chip{font-family:var(--mono);font-size:12.5px;padding:9px 14px;border-radius:9px;background:var(--panel);
  border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .15s;}
.chip.active{color:var(--bg);background:var(--cyan);border-color:var(--cyan);font-weight:700;}

/* ---------- Buttons ---------- */
.btn-primary{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--amber),#c9852a);
  color:#15110a;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:0.01em;
  box-shadow:0 6px 20px rgba(232,163,61,0.25);}
.btn-primary:disabled{opacity:0.4;box-shadow:none;}
.btn-primary:active{transform:scale(0.985);}
.btn-secondary{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--panel);
  color:var(--text);font-weight:600;font-size:14px;cursor:pointer;}
.btn-secondary:active{transform:scale(0.985);}
.btn-ghost{background:none;border:none;color:var(--cyan);font-family:var(--mono);font-size:12.5px;cursor:pointer;padding:8px;}

/* ---------- Quiz screen ---------- */
.quiz-top{display:flex;align-items:center;gap:12px;}
.qcount{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap;}
.progress-track{flex:1;height:6px;background:var(--panel);border-radius:3px;overflow:hidden;border:1px solid var(--line);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--cyan));border-radius:3px;transition:width .3s ease;}
.timer{font-family:var(--mono);font-size:12px;color:var(--amber);white-space:nowrap;}
.nav-grid-btn{flex-shrink:0;width:34px;height:34px;border-radius:9px;background:var(--panel);border:1px solid var(--line);
  color:var(--cyan);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-grid-btn:active{transform:scale(0.93);}

.qtag{display:flex;gap:8px;align-items:center;}
.qtag span{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:6px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.flag-btn{margin-left:auto;font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:8px;
  background:var(--panel-2);border:1px solid var(--line);color:var(--muted);cursor:pointer;}
.flag-btn.active{color:var(--amber);border-color:rgba(232,163,61,0.5);background:rgba(232,163,61,0.1);}
.flag-btn:active{transform:scale(0.95);}

/* ---------- Question navigator modal ---------- */
.nav-overlay{position:fixed;inset:0;z-index:10;background:rgba(6,9,14,0.72);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease both;}
.nav-modal{width:100%;max-width:640px;background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;
  padding:18px 18px 26px;max-height:78vh;overflow-y:auto;}
.nav-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:15px;}
.nav-close{background:var(--panel-2);border:1px solid var(--line);color:var(--text);width:30px;height:30px;
  border-radius:8px;font-size:14px;cursor:pointer;}
.nav-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;font-size:11px;color:var(--muted);font-family:var(--mono);}
.nav-legend span{display:flex;align-items:center;gap:5px;}
.nav-legend .dot{width:9px;height:9px;border-radius:3px;display:inline-block;background:var(--panel-2);border:1px solid var(--line);}
.nav-legend .dot.cur{background:var(--amber);border-color:var(--amber);}
.nav-legend .dot.done{background:var(--cyan);border-color:var(--cyan);}
.nav-legend .dot.flag{background:transparent;border-color:var(--amber);box-shadow:inset 0 0 0 1.5px var(--amber);}
.nav-legend .dot.open{background:var(--panel-2);border-color:var(--line);}
.nav-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.nav-cell{aspect-ratio:1;border-radius:9px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);
  font-family:var(--mono);font-size:12.5px;font-weight:700;cursor:pointer;position:relative;}
.nav-cell.done{background:rgba(79,209,197,0.14);border-color:var(--cyan);color:var(--cyan);}
.nav-cell.cur{background:var(--amber);border-color:var(--amber);color:#15110a;}
.nav-cell.flag::after{content:'';position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--amber);}
.nav-cell:active{transform:scale(0.92);}

/* ---------- Main menu sheet ---------- */
.menu-list{display:flex;flex-direction:column;gap:8px;}
.menu-item{display:flex;align-items:center;gap:12px;padding:14px 14px;border-radius:12px;background:var(--panel-2);
  border:1px solid var(--line);cursor:pointer;font-size:14.5px;font-weight:600;color:var(--text);}
.menu-item:active{transform:scale(0.98);}
.menu-item svg{width:18px;height:18px;flex-shrink:0;color:var(--cyan);}
.menu-item.danger svg{color:var(--red);}
.menu-item .mi-sub{font-size:11.5px;color:var(--muted);font-weight:400;margin-top:1px;}
.menu-item .mi-body{flex:1;min-width:0;}

.qcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 18px;font-size:15.5px;
  line-height:1.55;}

.options{display:flex;flex-direction:column;gap:10px;}
.option{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px;display:flex;
  gap:12px;align-items:flex-start;cursor:pointer;font-size:14.5px;line-height:1.45;transition:border-color .15s,background .15s;}
.option:active{transform:scale(0.995);}
.option .letter{font-family:var(--mono);font-weight:700;font-size:12.5px;width:22px;height:22px;border-radius:6px;
  background:var(--panel-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.option.correct{border-color:var(--green);background:rgba(63,191,127,0.08);}
.option.correct .letter{background:var(--green);color:#0a1a10;border-color:var(--green);}
.option.incorrect{border-color:var(--red);background:rgba(229,72,77,0.08);}
.option.incorrect .letter{background:var(--red);color:#1a0a0a;border-color:var(--red);}
.option.picked-exam{border-color:var(--cyan);background:rgba(79,209,197,0.08);}
.option.picked-exam .letter{background:var(--cyan);color:#08201d;border-color:var(--cyan);}
.option.disabled{cursor:default;}

.feedback-banner{border-radius:12px;padding:12px 14px;font-family:var(--mono);font-size:12.5px;display:flex;
  align-items:center;gap:8px;font-weight:700;letter-spacing:0.03em;}
.feedback-banner.correct{background:rgba(63,191,127,0.12);color:var(--green);border:1px solid rgba(63,191,127,0.35);}
.feedback-banner.incorrect{background:rgba(229,72,77,0.12);color:var(--red);border:1px solid rgba(229,72,77,0.35);}

.explain-box{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:13.5px;
  line-height:1.55;color:#C7D0E0;}
.explain-box .lbl{font-family:var(--mono);font-size:10.5px;color:var(--cyan);text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:6px;display:block;}

/* ---------- Bottom bar ---------- */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:2;background:linear-gradient(180deg,rgba(11,15,23,0),var(--bg) 30%);
  padding:14px 20px 20px;display:flex;justify-content:center;}
.bottom-bar-inner{max-width:640px;width:100%;display:flex;gap:10px;}

/* ---------- Results ---------- */
.score-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 0 4px;}
.score-num{font-family:var(--mono);font-size:44px;font-weight:700;}
.score-label{font-size:12px;color:var(--muted);font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase;}

.review-item{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--red);border-radius:10px;
  padding:12px 14px;font-size:13.5px;line-height:1.5;}
.review-item.ok{border-left-color:var(--green);}
.review-item .rq{font-weight:600;margin-bottom:6px;}
.review-item .ra{font-family:var(--mono);font-size:12px;color:var(--muted);}
.review-item .ra b{color:var(--green);}
.review-item .ra .wrong{color:var(--red);}

/* ---------- misc ---------- */
.muted{color:var(--muted);}
.center{text-align:center;}
.small{font-size:12px;}
a.linklike{color:var(--cyan);text-decoration:none;}
::selection{background:rgba(79,209,197,0.3);}

@media (max-width:380px){
  .brand-text span{display:none;}
  .status-pill{padding:5px 8px;}
}
</style>
</head>

<script>(function(){
"use strict";

/* ---------------- Data load ---------------- */
var RAW_B64 = document.getElementById('qdata').textContent.trim();
var QUESTIONS = [];
try{
  var jsonStr = decodeURIComponent(escape(atob(RAW_B64)));
  QUESTIONS = JSON.parse(jsonStr);
}catch(e){
  console.error('Failed to parse question data', e);
}

// Assign a stable id per question
QUESTIONS.forEach(function(q){ q.id = q.exam + '-' + q.num; });

var SETS = ['D1','D2','D3','D4','D5','D6','D7','D8'];
var SET_NAMES = {
  D1: 'Splunk Basics',
  D2: 'Basic Searching',
  D3: 'Using Fields in Searches',
  D4: 'Search Language Fundamentals',
  D5: 'Basic Transforming Commands',
  D6: 'Reports and Dashboards',
  D7: 'Lookups',
  D8: 'Scheduled Reports & Alerts'
};
var SET_WEIGHT = {D1:'5%', D2:'22%', D3:'20%', D4:'15%', D5:'15%', D6:'12%', D7:'6%', D8:'5%'};

function questionsForSet(setId){
  if(setId === 'ALL') return QUESTIONS.slice();
  if(setId === 'MISSED') return getMissedQuestions();
  return QUESTIONS.filter(function(q){ return q.exam === setId; });
}

/* ---------------- Storage (localStorage — this is an offline single-file tool) ---------------- */
var STORAGE_KEY = 'dennis_academy_splunk_progress_v1';
var DEFAULT_PROGRESS = { history: [], missed: {}, seen: {} };
var progress = JSON.parse(JSON.stringify(DEFAULT_PROGRESS));

function loadProgress(cb){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw) progress = JSON.parse(raw);
  }catch(e){
    console.warn('localStorage unavailable, progress will not persist', e);
  }
  cb();
}

function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }catch(e){
    console.warn('save failed', e);
  }
}

function getMissedQuestions(){
  var ids = Object.keys(progress.missed).filter(function(id){ return progress.missed[id] > 0; });
  return QUESTIONS.filter(function(q){ return ids.indexOf(q.id) !== -1; });
}

function recordAnswer(q, correct){
  if(correct){
    if(progress.missed[q.id]) delete progress.missed[q.id];
  } else {
    progress.missed[q.id] = (progress.missed[q.id] || 0) + 1;
  }
  progress.seen[q.id] = true;
}

function recordSession(setId, mode, total, correctCount, durationSec){
  progress.history.push({
    ts: Date.now(), setId: setId, mode: mode, total: total,
    correct: correctCount, durationSec: durationSec || 0
  });
  if(progress.history.length > 200) progress.history = progress.history.slice(-200);
  saveProgress();
}

function setStats(setId){
  var qs = setId === 'ALL' ? QUESTIONS : QUESTIONS.filter(function(q){ return q.exam === setId; });
  var total = qs.length;
  var attemptedIds = qs.filter(function(q){ return progress.seen[q.id]; }).length;
  var missedCount = qs.filter(function(q){ return progress.missed[q.id] > 0; }).length;
  return { total: total, attempted: attemptedIds, missed: missedCount };
}

function overallAccuracy(){
  var h = progress.history;
  if(!h.length) return null;
  var recent = h.slice(-10);
  var t = 0, c = 0;
  recent.forEach(function(s){ t += s.total; c += s.correct; });
  if(t === 0) return null;
  return Math.round((c/t)*100);
}

/* ---------------- Shuffle helpers ---------------- */
function shuffle(arr){
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i+1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ---------------- App State ---------------- */
var state = {
  screen: 'home',
  selectedSet: 'A',
  selectedLen: 25,
  selectedMode: 'practice', // practice | exam
  quiz: null // { questions:[], idx, answers:[], mode, setId, startTs }
};

var mainEl = document.getElementById('main');

/* ---------------- Header nav (Main Menu) ---------------- */
var mainMenuBtn = document.getElementById('mainMenuBtn');
mainMenuBtn.addEventListener('click', openMainMenu);

function exitToHomeWithConfirm(after){
  if(state.screen === 'quiz'){
    var answeredCount = state.quiz.answers.filter(function(a){ return a; }).length;
    if(answeredCount > 0 && answeredCount < state.quiz.questions.length){
      var ok = confirm('Leave this drill? Your progress on this session will be lost.');
      if(!ok) return;
    }
  }
  clearInterval(timerInterval);
  state.quiz = null;
  state.screen = 'home';
  if(after) after();
  renderHome();
}

function openMainMenu(){
  var overlay = document.createElement('div');
  overlay.className = 'nav-overlay';
  var box = document.createElement('div');
  box.className = 'nav-modal';

  var head = document.createElement('div');
  head.className = 'nav-modal-head';
  head.innerHTML = '<b>Main Menu</b><button class="nav-close" id="menuCloseBtn">✕</button>';
  box.appendChild(head);

  var list = document.createElement('div');
  list.className = 'menu-list';

  function addItem(iconSvg, title, sub, onClick, danger){
    var item = document.createElement('div');
    item.className = 'menu-item' + (danger ? ' danger' : '');
    item.innerHTML = iconSvg + '<div class="mi-body">'+title+(sub ? '<div class="mi-sub">'+sub+'</div>' : '')+'</div>';
    item.addEventListener('click', function(){
      document.body.removeChild(overlay);
      onClick();
    });
    list.appendChild(item);
  }

  var ICON_HOME = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>';
  var ICON_HISTORY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>';
  var ICON_FLAG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V4h12l-2 4 2 4H4"/></svg>';
  var ICON_MAP = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>';
  var ICON_RESTART = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>';
  var ICON_EXIT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>';

  if(state.screen === 'quiz'){
    addItem(ICON_MAP, 'Question Map', 'Jump to any question in this drill', function(){ openNavGrid(); });
    addItem(ICON_EXIT, 'Exit to Dashboard', 'Leave this drill in progress', function(){ exitToHomeWithConfirm(); }, true);
  } else if(state.screen === 'results'){
    addItem(ICON_RESTART, 'Retry This Set', 'Run the same set again', function(){ startQuiz(); });
    addItem(ICON_HOME, 'Dashboard', 'Back to the main console', function(){ state.screen='home'; renderHome(); } );
  } else if(state.screen === 'history'){
    addItem(ICON_HOME, 'Dashboard', 'Back to the main console', function(){ state.screen='home'; renderHome(); } );
  } else {
    addItem(ICON_HOME, 'Dashboard', 'Set selector & stats', function(){ state.screen='home'; renderHome(); } );
  }

  if(state.screen !== 'history'){
    addItem(ICON_HISTORY, 'Session History', progress.history.length + ' past session' + (progress.history.length===1?'':'s'), function(){
      state.screen = 'history'; renderHistory();
    });
  }
  var missedTotal = Object.keys(progress.missed).filter(function(id){return progress.missed[id]>0;}).length;
  if(missedTotal > 0 && state.screen !== 'quiz'){
    addItem(ICON_FLAG, 'Review Missed', missedTotal + ' flagged question' + (missedTotal===1?'':'s'), function(){
      state.selectedSet = 'MISSED';
      state.screen = 'home';
      renderHome();
    });
  }

  box.appendChild(list);
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  document.getElementById('menuCloseBtn').addEventListener('click', function(){
    document.body.removeChild(overlay);
  });
  overlay.addEventListener('click', function(e){
    if(e.target === overlay) document.body.removeChild(overlay);
  });
}

/* ---------------- Render: Home ---------------- */
function renderHome(){
  var acc = overallAccuracy();
  var totalAttempted = Object.keys(progress.seen).length;
  var missedTotal = Object.keys(progress.missed).filter(function(id){return progress.missed[id]>0;}).length;

  var html = '<div class="screen">';
  html += '<div class="stat-strip">';
  html += statCard(acc === null ? '—' : acc+'%', 'Last 10 Avg');
  html += statCard(totalAttempted, 'Questions Seen');
  html += statCard(missedTotal, 'Open Misses');
  html += '</div>';
  if(progress.history.length){
    html += '<div class="center"><button class="btn-ghost" id="viewHistoryBtn">View Session History ('+progress.history.length+') →</button></div>';
  }

  html += '<div class="section-lbl">Select Drill Domain (SPLK-1001 Blueprint)</div>';
  html += '<div class="set-grid">';
  SETS.forEach(function(s){
    var st = setStats(s);
    var pct = st.total ? Math.round((st.attempted/st.total)*100) : 0;
    var sel = state.selectedSet === s ? ' selected' : '';
    html += '<div class="set-card'+sel+'" data-set="'+s+'">';
    html += '<div class="set-badge">'+s.replace('D','')+'.0</div>';
    html += '<div class="set-info"><div class="set-name">'+SET_NAMES[s]+' <span style="color:var(--amber);font-family:var(--mono);font-size:10.5px;">('+SET_WEIGHT[s]+')</span></div>';
    html += '<div class="set-meta">'+st.total+' QUESTIONS · '+st.attempted+' SEEN · '+st.missed+' MISSED</div>';
    html += '<div class="set-bar"><div class="set-bar-fill" style="width:'+pct+'%"></div></div>';
    html += '</div></div>';
  });
  var allStats = setStats('ALL');
  var selAll = state.selectedSet === 'ALL' ? ' selected' : '';
  html += '<div class="set-card'+selAll+'" data-set="ALL">';
  html += '<div class="set-badge">ALL</div>';
  html += '<div class="set-info"><div class="set-name">Full Bank</div>';
  html += '<div class="set-meta">'+allStats.total+' QUESTIONS · ALL 8 DOMAINS COMBINED</div></div></div>';

  if(missedTotal > 0){
    var selMiss = state.selectedSet === 'MISSED' ? ' selected' : '';
    html += '<div class="set-card'+selMiss+'" data-set="MISSED">';
    html += '<div class="set-badge" style="color:var(--red);border-color:rgba(229,72,77,0.4);">!</div>';
    html += '<div class="set-info"><div class="set-name">Review Missed</div>';
    html += '<div class="set-meta">'+missedTotal+' QUESTIONS FLAGGED WRONG</div></div></div>';
  }
  html += '</div>'; // set-grid

  html += '<div class="section-lbl">Drill Length</div>';
  html += '<div class="chip-row" id="lenRow">';
  [10,25,50,100].forEach(function(n){
    var cls = state.selectedLen === n ? 'chip active' : 'chip';
    html += '<div class="'+cls+'" data-len="'+n+'">'+n+' Q</div>';
  });
  html += '<div class="'+(state.selectedLen==='ALL'?'chip active':'chip')+'" data-len="ALL">All</div>';
  html += '</div>';

  html += '<div class="section-lbl">Mode</div>';
  html += '<div class="chip-row" id="modeRow">';
  html += '<div class="'+(state.selectedMode==='practice'?'chip active':'chip')+'" data-mode="practice">Practice · Instant Feedback</div>';
  html += '<div class="'+(state.selectedMode==='exam'?'chip active':'chip')+'" data-mode="exam">Exam Sim · Timed</div>';
  html += '</div>';

  html += '</div>'; // screen

  mainEl.innerHTML = html;

  mainEl.querySelectorAll('.set-card').forEach(function(el){
    el.addEventListener('click', function(){
      state.selectedSet = el.getAttribute('data-set');
      renderHome();
    });
  });
  mainEl.querySelectorAll('#lenRow .chip').forEach(function(el){
    el.addEventListener('click', function(){
      var v = el.getAttribute('data-len');
      state.selectedLen = v === 'ALL' ? 'ALL' : parseInt(v,10);
      renderHome();
    });
  });
  mainEl.querySelectorAll('#modeRow .chip').forEach(function(el){
    el.addEventListener('click', function(){
      state.selectedMode = el.getAttribute('data-mode');
      renderHome();
    });
  });
  var histBtn = document.getElementById('viewHistoryBtn');
  if(histBtn) histBtn.addEventListener('click', function(){
    state.screen = 'history';
    renderHistory();
  });

  renderBottomBar([
    { label: 'Start Drill →', primary: true, onClick: startQuiz }
  ]);
}

function statCard(num, lbl){
  return '<div class="stat-card"><div class="num">'+num+'</div><div class="lbl">'+lbl+'</div></div>';
}

/* ---------------- Bottom bar ---------------- */
function renderBottomBar(buttons){
  var existing = document.querySelector('.bottom-bar');
  if(existing) existing.remove();
  var bar = document.createElement('div');
  bar.className = 'bottom-bar';
  var inner = document.createElement('div');
  inner.className = 'bottom-bar-inner';
  buttons.forEach(function(b){
    var btn = document.createElement('button');
    btn.className = b.primary ? 'btn-primary' : 'btn-secondary';
    btn.textContent = b.label;
    if(b.disabled) btn.disabled = true;
    btn.addEventListener('click', b.onClick);
    inner.appendChild(btn);
  });
  bar.appendChild(inner);
  document.getElementById('app').appendChild(bar);
}

/* ---------------- Start Quiz ---------------- */
function startQuiz(){
  var pool = questionsForSet(state.selectedSet);
  if(pool.length === 0) return;
  pool = shuffle(pool);
  var n = state.selectedLen === 'ALL' ? pool.length : Math.min(state.selectedLen, pool.length);
  pool = pool.slice(0, n);

  state.quiz = {
    questions: pool,
    idx: 0,
    answers: new Array(pool.length).fill(null), // {picked, correct}
    flagged: new Array(pool.length).fill(false),
    mode: state.selectedMode,
    setId: state.selectedSet,
    startTs: Date.now(),
    revealed: false
  };
  state.screen = 'quiz';
  renderQuiz();
}

/* ---------------- Render: Quiz ---------------- */
var timerInterval = null;

function renderQuiz(){
  var quiz = state.quiz;
  var q = quiz.questions[quiz.idx];
  var total = quiz.questions.length;
  var answered = quiz.answers[quiz.idx];

  var html = '<div class="screen">';
  html += '<div class="quiz-top">';
  html += '<button class="nav-grid-btn" id="navGridBtn" title="Question map">▦</button>';
  html += '<div class="qcount">Q '+(quiz.idx+1)+'/'+total+'</div>';
  html += '<div class="progress-track"><div class="progress-fill" style="width:'+((quiz.idx)/total*100)+'%"></div></div>';
  if(quiz.mode === 'exam'){
    html += '<div class="timer" id="timerDisp">00:00</div>';
  }
  html += '</div>';

  html += '<div class="qtag"><span>'+SET_NAME_OR(q.exam)+'</span><span>#'+q.num+'</span>';
  if(answered){
    html += answered.correct ? '<span style="color:var(--green);border-color:rgba(63,191,127,0.4);">Answered ✓</span>' :
      '<span style="color:var(--red);border-color:rgba(229,72,77,0.4);">Answered ✕</span>';
  }
  html += '<button class="flag-btn'+(quiz.flagged[quiz.idx]?' active':'')+'" id="flagBtn" title="Flag for review">'+(quiz.flagged[quiz.idx]?'★ Flagged':'☆ Flag')+'</button>';
  html += '</div>';

  html += '<div class="qcard">'+escapeHtml(q.question)+'</div>';

  html += '<div class="options">';
  var letters = Object.keys(q.options);
  var showFeedback = quiz.mode === 'practice' && answered;
  letters.forEach(function(L){
    var cls = 'option';
    if(showFeedback){
      cls += ' disabled';
      if(L === q.correct) cls += ' correct';
      else if(L === answered.picked) cls += ' incorrect';
    } else if(answered && quiz.mode === 'exam' && answered.picked === L){
      cls += ' picked-exam';
    }
    html += '<div class="'+cls+'" data-letter="'+L+'">';
    html += '<div class="letter">'+L+'</div><div>'+escapeHtml(q.options[L])+'</div>';
    html += '</div>';
  });
  html += '</div>';

  if(showFeedback){
    html += '<div class="feedback-banner '+(answered.correct?'correct':'incorrect')+'">'+
      (answered.correct ? '✓ CORRECT' : '✕ INCORRECT — correct answer: '+q.correct)+'</div>';
    html += '<div class="explain-box"><span class="lbl">Explanation</span>'+escapeHtml(q.explanation || 'No explanation available.')+'</div>';
  }

  html += '</div>'; // screen
  mainEl.innerHTML = html;

  document.getElementById('flagBtn').addEventListener('click', function(){
    quiz.flagged[quiz.idx] = !quiz.flagged[quiz.idx];
    renderQuiz();
  });
  document.getElementById('navGridBtn').addEventListener('click', openNavGrid);

  if(!showFeedback){
    mainEl.querySelectorAll('.option').forEach(function(el){
      el.addEventListener('click', function(){ selectOption(el.getAttribute('data-letter')); });
    });
  }

  var canAdvance = !!answered || (quiz.mode === 'exam');
  var buttons = [];
  if(quiz.idx > 0){
    buttons.push({ label: '← Back', primary:false, onClick: function(){ quiz.idx--; renderQuiz(); } });
  }
  var isLast = quiz.idx === total - 1;
  if(quiz.mode === 'practice'){
    buttons.push({
      label: isLast ? 'Finish Drill' : 'Next →',
      primary: true,
      disabled: !answered,
      onClick: function(){
        if(isLast) finishQuiz(); else { quiz.idx++; renderQuiz(); }
      }
    });
  } else {
    buttons.push({
      label: isLast ? 'Submit Exam' : 'Next →',
      primary: true,
      onClick: function(){
        if(isLast){
          var unanswered = quiz.answers.filter(function(a){ return !a; }).length;
          if(unanswered > 0){
            var ok = confirm(unanswered + ' question' + (unanswered===1?'':'s') + ' unanswered. Submit anyway?');
            if(!ok) return;
          }
          finishQuiz();
        } else { quiz.idx++; renderQuiz(); }
      }
    });
  }
  renderBottomBar(buttons);

  if(quiz.mode === 'exam'){
    clearInterval(timerInterval);
    timerInterval = setInterval(function(){
      var s = Math.floor((Date.now() - quiz.startTs)/1000);
      var mm = String(Math.floor(s/60)).padStart(2,'0');
      var ss = String(s%60).padStart(2,'0');
      var el = document.getElementById('timerDisp');
      if(el) el.textContent = mm+':'+ss;
    }, 1000);
  }
}

function SET_NAME_OR(exam){ return exam.replace('D','')+'.0'; }

/* ---------------- Question Navigator (jump grid) ---------------- */
function openNavGrid(){
  var quiz = state.quiz;
  var overlay = document.createElement('div');
  overlay.className = 'nav-overlay';
  var box = document.createElement('div');
  box.className = 'nav-modal';

  var head = document.createElement('div');
  head.className = 'nav-modal-head';
  head.innerHTML = '<b>Question Map</b><button class="nav-close" id="navCloseBtn">✕</button>';
  box.appendChild(head);

  var legend = document.createElement('div');
  legend.className = 'nav-legend';
  legend.innerHTML =
    '<span><i class="dot cur"></i>Current</span>' +
    '<span><i class="dot done"></i>Answered</span>' +
    '<span><i class="dot flag"></i>Flagged</span>' +
    '<span><i class="dot open"></i>Unanswered</span>';
  box.appendChild(legend);

  var grid = document.createElement('div');
  grid.className = 'nav-grid';
  quiz.questions.forEach(function(q, i){
    var btn = document.createElement('button');
    var cls = 'nav-cell';
    if(i === quiz.idx) cls += ' cur';
    else if(quiz.answers[i]) cls += ' done';
    if(quiz.flagged[i]) cls += ' flag';
    btn.className = cls;
    btn.textContent = (i+1);
    btn.addEventListener('click', function(){
      quiz.idx = i;
      document.body.removeChild(overlay);
      renderQuiz();
    });
    grid.appendChild(btn);
  });
  box.appendChild(grid);
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  document.getElementById('navCloseBtn').addEventListener('click', function(){
    document.body.removeChild(overlay);
  });
  overlay.addEventListener('click', function(e){
    if(e.target === overlay) document.body.removeChild(overlay);
  });
}

/* ---------------- Keyboard shortcuts (desktop) ---------------- */
document.addEventListener('keydown', function(e){
  if(state.screen !== 'quiz') return;
  if(document.querySelector('.nav-overlay')) return;
  var quiz = state.quiz;
  var q = quiz.questions[quiz.idx];
  var letters = Object.keys(q.options);
  var upKey = e.key.toUpperCase();
  if(letters.indexOf(upKey) !== -1){
    selectOption(upKey);
  } else if(e.key === 'ArrowRight'){
    if(quiz.idx < quiz.questions.length - 1){ quiz.idx++; renderQuiz(); }
  } else if(e.key === 'ArrowLeft'){
    if(quiz.idx > 0){ quiz.idx--; renderQuiz(); }
  }
});

/* ---------------- Swipe navigation (mobile) ---------------- */
var touchStartX = null;
mainEl.addEventListener('touchstart', function(e){
  if(state.screen !== 'quiz') return;
  touchStartX = e.changedTouches[0].clientX;
}, {passive:true});
mainEl.addEventListener('touchend', function(e){
  if(state.screen !== 'quiz' || touchStartX === null) return;
  var dx = e.changedTouches[0].clientX - touchStartX;
  touchStartX = null;
  if(Math.abs(dx) < 60) return;
  var quiz = state.quiz;
  if(dx < 0 && quiz.idx < quiz.questions.length - 1){ quiz.idx++; renderQuiz(); }
  else if(dx > 0 && quiz.idx > 0){ quiz.idx--; renderQuiz(); }
}, {passive:true});

function selectOption(letter){
  var quiz = state.quiz;
  var q = quiz.questions[quiz.idx];
  if(quiz.answers[quiz.idx]) return; // already answered, lock in practice mode after first pick
  var correct = letter === q.correct;
  quiz.answers[quiz.idx] = { picked: letter, correct: correct };
  recordAnswer(q, correct);
  saveProgress();
  renderQuiz();
}

/* ---------------- Finish / Results ---------------- */
function finishQuiz(){
  clearInterval(timerInterval);
  var quiz = state.quiz;
  var total = quiz.questions.length;
  var correctCount = 0;
  quiz.answers.forEach(function(a){ if(a && a.correct) correctCount++; });
  var durationSec = Math.floor((Date.now() - quiz.startTs)/1000);
  recordSession(quiz.setId, quiz.mode, total, correctCount, durationSec);
  state.screen = 'results';
  renderResults();
}

function renderResults(){
  var quiz = state.quiz;
  var total = quiz.questions.length;
  var correctCount = 0;
  quiz.answers.forEach(function(a){ if(a && a.correct) correctCount++; });
  var pct = total ? Math.round((correctCount/total)*100) : 0;
  var color = pct >= 80 ? 'var(--green)' : (pct >= 60 ? 'var(--amber)' : 'var(--red)');
  var durationSec = Math.floor((Date.now() - quiz.startTs)/1000);
  var mm = Math.floor(durationSec/60), ss = durationSec%60;

  var html = '<div class="screen">';
  html += '<div class="section-lbl">Session Debrief</div>';
  html += '<div class="score-ring-wrap">';
  html += '<div class="score-num" style="color:'+color+'">'+pct+'%</div>';
  html += '<div class="score-label">'+correctCount+' / '+total+' correct · '+mm+'m '+String(ss).padStart(2,'0')+'s</div>';
  html += '</div>';

  var missedItems = [];
  quiz.questions.forEach(function(q, i){
    var a = quiz.answers[i];
    if(!a || !a.correct) missedItems.push({q:q, a:a});
  });

  if(missedItems.length){
    html += '<div class="section-lbl">Flagged For Review ('+missedItems.length+')</div>';
    missedItems.forEach(function(item){
      html += '<div class="review-item">';
      html += '<div class="rq">'+escapeHtml(item.q.question)+'</div>';
      html += '<div class="ra">Your answer: <span class="wrong">'+(item.a ? item.a.picked : '—')+'</span> · Correct: <b>'+item.q.correct+'</b> — '+escapeHtml(item.q.options[item.q.correct])+'</div>';
      html += '</div>';
    });
  } else {
    html += '<div class="review-item ok"><div class="rq">Clean sweep — no misses this session.</div></div>';
  }

  html += '</div>';
  mainEl.innerHTML = html;

  var buttons = [
    { label: 'Retry This Set', primary:true, onClick: function(){ state.screen='home'; startQuiz(); } },
    { label: 'Back to Console', primary:false, onClick: function(){ state.screen='home'; renderHome(); } }
  ];
  renderBottomBar(buttons);
}

function labelForSetId(setId){
  if(setId === 'ALL') return 'Full Bank';
  if(setId === 'MISSED') return 'Review Missed';
  if(SET_NAMES[setId]) return SET_NAME_OR(setId) + ' ' + SET_NAMES[setId];
  return 'Set ' + setId;
}

/* ---------------- Session History ---------------- */
function renderHistory(){
  var html = '<div class="screen">';
  html += '<div class="section-lbl">Session Log</div>';
  var h = progress.history.slice().reverse();
  if(!h.length){
    html += '<div class="review-item ok"><div class="rq">No sessions recorded yet.</div></div>';
  } else {
    h.forEach(function(s){
      var pct = s.total ? Math.round((s.correct/s.total)*100) : 0;
      var color = pct >= 80 ? 'var(--green)' : (pct >= 60 ? 'var(--amber)' : 'var(--red)');
      var d = new Date(s.ts);
      var dateStr = (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear().toString().slice(2)+' '+
        String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      var mm = Math.floor((s.durationSec||0)/60), ss = (s.durationSec||0)%60;
      html += '<div class="set-card" style="cursor:default;">';
      html += '<div class="set-badge" style="color:'+color+';">'+pct+'%</div>';
      html += '<div class="set-info"><div class="set-name">'+labelForSetId(s.setId)+
        ' · '+(s.mode==='exam'?'Exam Sim':'Practice')+'</div>';
      html += '<div class="set-meta">'+dateStr+' · '+s.correct+'/'+s.total+' correct · '+mm+'m '+String(ss).padStart(2,'0')+'s</div></div>';
      html += '</div>';
    });
  }
  html += '</div>';
  mainEl.innerHTML = html;
  renderBottomBar([
    { label: 'Back to Console', primary: true, onClick: function(){ state.screen='home'; renderHome(); } }
  ]);
}

/* ---------------- Utils ---------------- */
function escapeHtml(str){
  if(str == null) return '';
  return String(str).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

/* ---------------- Boot ---------------- */
loadProgress(function(){
  renderHome();
});

})();
</script>
